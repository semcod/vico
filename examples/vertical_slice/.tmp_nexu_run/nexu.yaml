version: nexu.v1
project:
  name: .tmp_nexu_run
  source_of_truth:
    intent: intract.yaml
    capsules: .nexu/capsules
    snapshots: .nexu/snapshots
verification:
  fail_on:
  - forbidden_effect
  - invalid_contract
  warn_on:
  - missing_tests
  - partial_output_match
llm:
  provider: offline
  model: openrouter/qwen/qwen3-coder-next
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  temperature: 0.1
  allow_network_calls: false
orchestration:
  default_steps: 10
  llm_mode: offline
  require_verification_after_each_step: true
mcp:
  enabled: true
  transport: stdio
  allow_apply: false
review:
  require_human_approval: true
  evidence_required: true
  fail_on:
  - fail
  warn_on:
  - partial
  - warn
preview:
  default_horizon: 10
  render:
  - text_wireframe
  - ui_blueprint
